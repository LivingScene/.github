name: PR title

# Reusable workflow — called by each repo's thin caller on pull_request events.
# The PR title becomes the squash-merge commit on main, so it must be a valid
# Conventional Commit. This keeps history + auto-generated release notes machine-readable.
on:
  workflow_call:

jobs:
  lint-title:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
