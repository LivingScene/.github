name: Security

# Reusable — SAST (Semgrep OSS) + dependency audit for every repo.
# CodeQL + dependency-review need GitHub Advanced Security (not included on Team for
# private repos), so this is the plan-compatible security gate. Called by each repo's
# thin .github/workflows/security.yml. The `sast` job is the required check; `audit`
# is advisory (Dependabot alerts + security updates are the enforcing dependency gate).
on:
  workflow_call:

jobs:
  sast:
    name: sast
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Semgrep (OSS security rulesets)
        run: semgrep scan --config p/security-audit --config p/secrets --error --severity ERROR

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - name: Dependency audit (advisory)
        run: pnpm audit --audit-level=high || true
