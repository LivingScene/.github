name: Web CI

# Reusable workflow — the quality gate for the Next.js web repos (hub, marketing).
# Called by each repo's thin .github/workflows/ci.yml.
on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24" # pnpm 11 needs Node >= 22.13 (uses node:sqlite)

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # pnpm version comes from packageManager in package.json
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
        env:
          # Placeholder public env so `next build` never fails on missing vars in CI.
          # Real values are injected by Vercel at deploy time.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
