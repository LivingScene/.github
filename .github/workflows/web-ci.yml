name: Web CI

# Reusable workflow — the quality gate for the Next.js web repos (hub, marketing).
# Called by each repo's thin .github/workflows/ci.yml.
on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24" # pnpm 11 needs Node >= 22.13 (uses node:sqlite)

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Actions are SHA-pinned (supply-chain); Dependabot bumps them via the version comment.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9 — pnpm version from packageManager
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test:coverage
      - name: Build
        run: pnpm build
        env:
          # Placeholder public env so `next build` never fails on missing vars in CI.
          # Real values are injected by Vercel at deploy time.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
