name: Bug report
description: Something isn't working as expected
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please search existing issues first.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / URL
      description: App version or the URL where you saw this.
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Logs, screenshots, environment.
